name: 构建客户桌面安装包

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:
    inputs:
      customer:
        description: 客户名称
        required: true
        default: CRAZYAIGC
      server_url:
        description: 已部署好的 Crazor 后端/统一入口地址
        required: true
      platform:
        description: 构建平台
        required: true
        type: choice
        default: macos-current
        options:
          - macos-current
          - windows-current
      preflight_mode:
        description: 托管服务预检模式；局域网后端通常选 warn，公网/内网 runner 可选 strict
        required: true
        type: choice
        default: warn
        options:
          - warn
          - strict
          - skip
      delivery_protocol_version:
        description: 客户端和托管后端必须一致的交付协议版本
        required: true
        default: "1"

jobs:
  build:
    name: 客户端安装包验证
    runs-on: ${{ github.event_name == 'workflow_dispatch' && inputs.platform == 'windows-current' && 'windows-latest' || 'macos-latest' }}
    defaults:
      run:
        shell: bash
    env:
      CUSTOMER_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.customer || 'PR 验证' }}
      SERVER_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.server_url || 'http://127.0.0.1:5173' }}
      CRAZOR_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
      CRAZOR_CUSTOMER_SERVER_PREFLIGHT: ${{ github.event_name == 'workflow_dispatch' && inputs.preflight_mode || 'warn' }}
      CRAZOR_DELIVERY_PROTOCOL_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.delivery_protocol_version || '1' }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v6.0.2

      - name: 安装 Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            web/package-lock.json
            desktop/package-lock.json

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 安装前端依赖
        working-directory: web
        run: npm ci

      - name: 安装桌面端依赖
        working-directory: desktop
        run: npm ci

      - name: 构建客户安装包
        run: ./scripts/build-customer.sh "$CUSTOMER_NAME" "$SERVER_URL" current

      - name: 上传安装包
        uses: actions/upload-artifact@v7.0.1
        with:
          name: crazor-desktop-${{ github.run_id }}
          path: desktop/src-tauri/target/release/bundle/**/*
          if-no-files-found: error
