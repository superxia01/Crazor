name: 构建客户桌面安装包

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:
    inputs:
      customer:
        description: 客户名称
        required: true
        default: CRAZYAIGC
      server_url:
        description: 已部署好的 Crazor 后端/统一入口地址
        required: true
      platform:
        description: 构建平台
        required: true
        type: choice
        default: macos-current
        options:
          - macos-current
          - windows-current
      preflight_mode:
        description: 托管服务预检模式；局域网后端通常选 warn，公网/内网 runner 可选 strict
        required: true
        type: choice
        default: warn
        options:
          - warn
          - strict
          - skip
      delivery_protocol_version:
        description: 客户端和托管后端必须一致的交付协议版本
        required: true
        default: "1"
      handoff_mode:
        description: 交付验收模式；online-chat 会真实调用一次非流式对话
        required: true
        type: choice
        default: offline
        options:
          - offline
          - online-entrypoints
          - online-chat
      installer_trust_mode:
        description: 安装器可信模式；正式客户包选择 require-trusted，签名或公证未通过会失败
        required: true
        type: choice
        default: test
        options:
          - test
          - require-trusted

jobs:
  build:
    name: 客户端安装包验证 (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(github.event_name == 'workflow_dispatch' && format('[{{"platform":"{0}","runner":"{1}"}}]', inputs.platform, inputs.platform == 'windows-current' && 'windows-latest' || 'macos-latest') || '[{"platform":"macos-current","runner":"macos-latest"},{"platform":"windows-current","runner":"windows-latest"}]') }}
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    env:
      CUSTOMER_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.customer || 'PR 验证' }}
      SERVER_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.server_url || 'http://127.0.0.1:5173' }}
      PACKAGE_PLATFORM: ${{ matrix.platform }}
      CRAZOR_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
      CRAZOR_CUSTOMER_SERVER_PREFLIGHT: ${{ github.event_name == 'workflow_dispatch' && inputs.preflight_mode || 'warn' }}
      CRAZOR_DELIVERY_PROTOCOL_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.delivery_protocol_version || '1' }}
      CUSTOMER_HANDOFF_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.handoff_mode || 'offline' }}
      CRAZOR_REQUIRE_INSTALLER_TRUST: ${{ github.event_name == 'workflow_dispatch' && inputs.installer_trust_mode == 'require-trusted' && '1' || '' }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v6.0.2

      - name: 安装 Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            web/package-lock.json
            desktop/package-lock.json

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 安装前端依赖
        working-directory: web
        run: npm ci

      - name: 安装桌面端依赖
        working-directory: desktop
        run: npm ci

      - name: 准备 macOS 公证密钥
        if: ${{ matrix.platform == 'macos-current' }}
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          if [ -n "$APPLE_API_KEY" ] && [ -n "$APPLE_API_KEY_P8" ]; then
            mkdir -p "$RUNNER_TEMP/crazor-private-keys"
            APPLE_API_KEY_PATH="$RUNNER_TEMP/crazor-private-keys/AuthKey_${APPLE_API_KEY}.p8"
            printf '%s' "$APPLE_API_KEY_P8" > "$APPLE_API_KEY_PATH"
            chmod 600 "$APPLE_API_KEY_PATH"
            echo "APPLE_API_KEY_PATH=$APPLE_API_KEY_PATH" >> "$GITHUB_ENV"
            echo "API_PRIVATE_KEYS_DIR=$RUNNER_TEMP/crazor-private-keys" >> "$GITHUB_ENV"
          else
            echo "未配置 APPLE_API_KEY/APPLE_API_KEY_P8，跳过 App Store Connect API 密钥文件准备"
          fi

      - name: 配置 macOS 签名参数
        if: ${{ matrix.platform == 'macos-current' }}
        env:
          CRAZOR_APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          CRAZOR_APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          CRAZOR_APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          CRAZOR_APPLE_ID: ${{ secrets.APPLE_ID }}
          CRAZOR_APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          CRAZOR_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CRAZOR_APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          CRAZOR_APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          CRAZOR_APPLE_PROVIDER_SHORT_NAME: ${{ secrets.APPLE_PROVIDER_SHORT_NAME }}
        run: |
          export_if_set() {
            local target_name="$1"
            local source_value="$2"
            if [ -n "$source_value" ]; then
              {
                echo "${target_name}<<EOF_${target_name}"
                printf '%s\n' "$source_value"
                echo "EOF_${target_name}"
              } >> "$GITHUB_ENV"
            fi
          }

          export_if_set "APPLE_CERTIFICATE" "$CRAZOR_APPLE_CERTIFICATE"
          export_if_set "APPLE_CERTIFICATE_PASSWORD" "$CRAZOR_APPLE_CERTIFICATE_PASSWORD"
          export_if_set "APPLE_SIGNING_IDENTITY" "$CRAZOR_APPLE_SIGNING_IDENTITY"
          export_if_set "APPLE_ID" "$CRAZOR_APPLE_ID"
          export_if_set "APPLE_PASSWORD" "$CRAZOR_APPLE_PASSWORD"
          export_if_set "APPLE_TEAM_ID" "$CRAZOR_APPLE_TEAM_ID"
          export_if_set "APPLE_API_KEY" "$CRAZOR_APPLE_API_KEY"
          export_if_set "APPLE_API_ISSUER" "$CRAZOR_APPLE_API_ISSUER"
          export_if_set "APPLE_PROVIDER_SHORT_NAME" "$CRAZOR_APPLE_PROVIDER_SHORT_NAME"

          if [ -z "$CRAZOR_APPLE_CERTIFICATE" ] && [ -z "$CRAZOR_APPLE_SIGNING_IDENTITY" ]; then
            echo "未配置 macOS 签名证书或签名身份，按未签名测试包构建"
          fi

      - name: 导入 Windows 签名证书
        if: ${{ matrix.platform == 'windows-current' }}
        shell: powershell
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE) -or [string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_PASSWORD)) {
            Write-Host "未配置 WINDOWS_CERTIFICATE/WINDOWS_CERTIFICATE_PASSWORD，跳过 Windows 证书导入"
            exit 0
          }
          $certDir = Join-Path $env:RUNNER_TEMP "crazor-codesign"
          New-Item -ItemType Directory -Force -Path $certDir | Out-Null
          $certText = Join-Path $certDir "certificate-base64.txt"
          $certPfx = Join-Path $certDir "certificate.pfx"
          Set-Content -Path $certText -Value $env:WINDOWS_CERTIFICATE
          certutil -decode $certText $certPfx
          $securePassword = ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -Force -AsPlainText
          Import-PfxCertificate -FilePath $certPfx -CertStoreLocation Cert:\CurrentUser\My -Password $securePassword
          Remove-Item $certText, $certPfx -Force

      - name: 配置 Windows 签名参数
        if: ${{ matrix.platform == 'windows-current' }}
        env:
          WINDOWS_CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}
          WINDOWS_DIGEST_ALGORITHM: ${{ vars.WINDOWS_DIGEST_ALGORITHM }}
          WINDOWS_TIMESTAMP_URL: ${{ vars.WINDOWS_TIMESTAMP_URL }}
          TAURI_WINDOWS_SIGNTOOL_PATH: ${{ vars.TAURI_WINDOWS_SIGNTOOL_PATH }}
        run: |
          if [ -n "$TAURI_WINDOWS_SIGNTOOL_PATH" ]; then
            echo "TAURI_WINDOWS_SIGNTOOL_PATH=$TAURI_WINDOWS_SIGNTOOL_PATH" >> "$GITHUB_ENV"
          fi

          if [ -z "$WINDOWS_CERTIFICATE_THUMBPRINT" ]; then
            echo "未配置 WINDOWS_CERTIFICATE_THUMBPRINT，跳过 Tauri Windows 签名参数写入"
            exit 0
          fi
          node -e '
            const fs = require("node:fs")
            const path = "desktop/src-tauri/tauri.conf.json"
            const config = JSON.parse(fs.readFileSync(path, "utf8"))
            config.bundle = config.bundle || {}
            config.bundle.windows = {
              ...(config.bundle.windows || {}),
              certificateThumbprint: process.env.WINDOWS_CERTIFICATE_THUMBPRINT,
              digestAlgorithm: process.env.WINDOWS_DIGEST_ALGORITHM || "sha256",
            }
            if (process.env.WINDOWS_TIMESTAMP_URL) {
              config.bundle.windows.timestampUrl = process.env.WINDOWS_TIMESTAMP_URL
            }
            fs.writeFileSync(path, `${JSON.stringify(config, null, 2)}\n`)
          '

      - name: 构建客户安装包
        run: ./scripts/build-customer.sh "$CUSTOMER_NAME" "$SERVER_URL" "$PACKAGE_PLATFORM"

      - name: 验证客户交付包
        run: node ./scripts/verify-customer-delivery.mjs desktop/src-tauri/target/release/customer-delivery

      - name: 验证安装包可安装性
        run: node ./scripts/verify-customer-installer.mjs desktop/src-tauri/target/release/customer-delivery

      - name: 验证客户交付验收入口
        env:
          CRAZOR_DESKTOP_SMOKE_ACCESS_CODE: ${{ secrets.CRAZOR_CUSTOMER_ACCESS_CODE }}
          CRAZOR_DESKTOP_SMOKE_LOGIN_TOKEN: ${{ secrets.CRAZOR_CUSTOMER_LOGIN_TOKEN }}
          CRAZOR_DESKTOP_SMOKE_ACTOR_TOKEN: ${{ secrets.CRAZOR_SMOKE_TOKEN }}
        run: |
          HANDOFF_ARGS=(
            desktop/src-tauri/target/release/customer-delivery
            --output desktop/src-tauri/target/release/customer-delivery/crazor-handoff-report.md
            --json
          )

          case "$CUSTOMER_HANDOFF_MODE" in
            offline)
              HANDOFF_ARGS+=(--skip-live)
              ;;
            online-entrypoints)
              HANDOFF_ARGS+=(--skip-live-chat)
              ;;
            online-chat)
              ;;
            *)
              echo "错误: CUSTOMER_HANDOFF_MODE 只支持 offline、online-entrypoints 或 online-chat"
              exit 1
              ;;
          esac

          bash ./scripts/hermes handoff-check "${HANDOFF_ARGS[@]}"

      - name: 验证最终交付目录
        run: node ./scripts/verify-customer-delivery.mjs desktop/src-tauri/target/release/customer-delivery

      - name: 上传安装包
        uses: actions/upload-artifact@v7.0.1
        with:
          name: crazor-desktop-${{ env.PACKAGE_PLATFORM }}-${{ github.run_id }}
          path: desktop/src-tauri/target/release/customer-delivery/**/*
          if-no-files-found: error
